Janet Job Optimizer — Run Instructions

This document explains how to:
	1.	Activate the virtual environment
	2.	Load environment variables
	3.	Install dependencies
	4.	Launch the Streamlit app

⸻

1️⃣ Navigate to Project Root

Open Terminal and run:
cd "/Users/jasonrosenblum/Library/CloudStorage/Dropbox/job-optimizer"

Confirm you’re in the correct directory:
pwd
ls -a
You should see:
	•	app.py
	•	venv/
	•	.env
	•	llm/
	•	engine/
	•	schemas/

⸻

2️⃣ Activate Virtual Environment

source venv/bin/activate
which python
.../job-optimizer/venv/bin/python

3️⃣ Ensure Dependencies Are Installed

If this is a fresh setup or you rebuilt the venv:

pip install -r requirements.txt
pip install openai
python -c "import openai; print('openai installed')"

4️⃣ Verify .env is Present

Confirm .env exists:

ls -a | grep ".env"

Check contents (do NOT share key publicly):
cat .env

It must contain:
OPENAI_API_KEY=
OPENAI_MODEL=gpt-4o-mini
OPENAI_TEMPERATURE=0.2

No spaces around =.

⸻

5️⃣ Launch the App

From project root (with venv active):

streamlit run app.py

f Streamlit is not using the venv version:
venv/bin/streamlit run app.py

6️⃣ If You Get “No module named openai”

Install it inside the active venv:

pip install openai

7️⃣ If You Get API Key Error

Verify:

python -c "import os; from dotenv import load_dotenv; load_dotenv(); print(bool(os.getenv('OPENAI_API_KEY')))"

Should print:

True

If False:
	•	.env is in wrong directory
	•	.env formatted incorrectly
	•	You launched from wrong folder

	